name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older in-flight runs on the same ref. Avoids burning runner
# minutes when a feature branch gets multiple pushes back-to-back.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Rust-aware cache: per-crate keys, target/ pruning, incremental
      # restore even when Cargo.lock changes. Replaces the hand-rolled
      # actions/cache config that re-keyed the entire target/ on any
      # lockfile churn.
      - uses: Swatinem/rust-cache@v2

      # `cargo test` already builds the lib + test targets; the explicit
      # `cargo build` was duplicating compile work. `--locked` keeps the
      # cache key stable by refusing to update Cargo.lock implicitly.
      - name: Test
        run: cargo test --workspace --locked --verbose
