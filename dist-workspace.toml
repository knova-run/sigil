[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# npm publishing is hand-rolled (esbuild-style optionalDependencies pattern,
# not cargo-dist's postinstall-download wrapper) — see
# .github/workflows/release.yml's `publish-npm` job and scripts/publish-npm.mjs.
# This gives a fast `npx @knova-run/sigil` with no first-run download:
# npm picks the matching @knova-run/sigil-<platform> sub-package at install
# time via the wrapper's optionalDependencies + os/cpu fields.
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Which actions to run on pull requests
pr-run-mode = "plan"
# Self-update is built into sigil via axoupdater library (no separate binary needed)
install-updater = false
# The archive format to use for non-windows builds
unix-archive = ".tar.gz"
# Whether to auto-include files like README, LICENSE, CHANGELOG
auto-includes = true
# Build with DuckDB backend + BPE tokenizer baked in. Adds ~15 MB to
# the binary but removes the need for a separate `sigil-full-*` asset
# set. See PR #6 for the trade-off.
features = ["db", "tokenizer"]
# Inject a Swatinem/rust-cache step before each `dist build` so the
# DuckDB bundled C++ compile + tree-sitter grammars don't rebuild from
# scratch on every tag push. Path is relative to .github/workflows/,
# so `../build-setup.yml` lives at .github/build-setup.yml — keeping
# the snippet out of `workflows/` so GitHub Actions doesn't try to
# run it as a standalone workflow (it's a YAML step list, not a valid
# workflow file).
github-build-setup = "../build-setup.yml"

[dist.github-custom-runners]
aarch64-unknown-linux-gnu = "ubuntu-latest"
